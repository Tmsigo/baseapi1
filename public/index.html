                
                      <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantinho da Vanessa</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0}
header{background:#c62828;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mesa{background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,.15);cursor:pointer}
.total{font-weight:bold;color:#c62828}
#painel{display:none;position:fixed;inset:0;background:#fff;padding:15px;overflow:auto}
button{background:#c62828;color:#fff;border:none;padding:10px;border-radius:8px;margin:4px;cursor:pointer}
input,select{padding:8px;width:100%;margin:5px 0}
table{width:100%;border-collapse:collapse}
td,th{border-bottom:1px solid #ddd;padding:8px}
</style>
</head>
<body>
<header><h1>🍽️ Cantinho da Vanessa</h1></header>

<div class="container">
<h2>Mesas</h2>
<div id="mesas" class="grid"></div>

<h2>Resumo do Dia</h2>
<p id="faturamento"></p>

<h2>Histórico</h2>
<div id="historico"></div>
</div>

<div id="painel">
<h2 id="tituloMesa"></h2>

<select id="produto"></select>
<input type="number" id="qtd" placeholder="Quantidade" min="1" value="1">

<button onclick="adicionarItem()">Adicionar Pedido</button>
<button onclick="fecharMesa()">Fechar Conta</button>
<button onclick="fecharPainel()">Voltar</button>

<h3>Pedidos</h3>
<table>
<thead><tr><th>Item</th><th>Qtd</th><th>Total</th></tr></thead>
<tbody id="pedidos"></tbody>
</table>

<h3 id="totalMesa"></h3>

<hr>
<h3>Adicionar Produto ao Cardápio</h3>
<input id="novoNome" placeholder="Nome do produto">
<input id="novoPreco" type="number" placeholder="Preço">
<button onclick="novoProduto()">Salvar Produto</button>
</div>

<script>
let cardapio=JSON.parse(localStorage.getItem('cv_cardapio'))||[
{nome:'Espeto de Carne',preco:10},
{nome:'Espeto de Frango',preco:8},
{nome:'Espeto de Queijo',preco:7},
{nome:'Refrigerante',preco:6},
{nome:'Coca 2L',preco:12},
{nome:'Água',preco:3},
{nome:'Batata Frita',preco:20}
];

let mesas=JSON.parse(localStorage.getItem('cv_mesas'))||Array.from({length:10},()=>[]);
let historico=JSON.parse(localStorage.getItem('cv_historico'))||[];
let mesaAtual=0;

function salvar(){
localStorage.setItem('cv_cardapio',JSON.stringify(cardapio));
localStorage.setItem('cv_mesas',JSON.stringify(mesas));
localStorage.setItem('cv_historico',JSON.stringify(historico));
}

function renderMesas(){
let div=document.getElementById('mesas');
div.innerHTML='';
mesas.forEach((m,i)=>{
let total=m.reduce((s,x)=>s+x.total,0);
div.innerHTML+=`<div class="mesa" onclick="abrirMesa(${i})">
<h3>Mesa ${i+1}</h3>
<p>${m.length} itens</p>
<p class="total">R$ ${total.toFixed(2)}</p>
</div>`;
});
let fat=historico.reduce((s,x)=>s+x.total,0);
document.getElementById('faturamento').innerHTML=`Total vendido: <b>R$ ${fat.toFixed(2)}</b>`;
document.getElementById('historico').innerHTML=historico.map(h=>
`<div>🧾 Mesa ${h.mesa} - R$ ${h.total.toFixed(2)} - ${h.data}</div>`).join('');
}

function carregarCardapio(){
let s=document.getElementById('produto');
s.innerHTML='';
cardapio.forEach((p,i)=>{
s.innerHTML+=`<option value="${i}">${p.nome} - R$ ${p.preco}</option>`;
});
}

function abrirMesa(i){
mesaAtual=i;
document.getElementById('painel').style.display='block';
document.getElementById('tituloMesa').innerText='Mesa '+(i+1);
atualizarMesa();
}

function fecharPainel(){document.getElementById('painel').style.display='none';}

function atualizarMesa(){
let tbody=document.getElementById('pedidos');
tbody.innerHTML='';
let total=0;
mesas[mesaAtual].forEach(p=>{
total+=p.total;
tbody.innerHTML+=`<tr><td>${p.nome}</td><td>${p.qtd}</td><td>R$ ${p.total.toFixed(2)}</td></tr>`;
});
document.getElementById('totalMesa').innerText='Total: R$ '+total.toFixed(2);
renderMesas();
salvar();
}

function adicionarItem(){
let prod=cardapio[document.getElementById('produto').value];
let qtd=parseInt(document.getElementById('qtd').value);
mesas[mesaAtual].push({nome:prod.nome,qtd:qtd,total:prod.preco*qtd});
atualizarMesa();
}

function fecharMesa(){
let total=mesas[mesaAtual].reduce((s,x)=>s+x.total,0);
if(total<=0)return alert('Mesa vazia!');
historico.unshift({
mesa:mesaAtual+1,
total:total,
data:new Date().toLocaleString('pt-BR')
});
mesas[mesaAtual]=[];
atualizarMesa();
alert('Conta fechada!');
}

function novoProduto(){
let nome=document.getElementById('novoNome').value;
let preco=parseFloat(document.getElementById('novoPreco').value);
if(!nome||!preco)return;
cardapio.push({nome,preco});
carregarCardapio();
salvar();
alert('Produto adicionado!');
}

carregarCardapio();
renderMesas();
</script>
</body>
</html>
