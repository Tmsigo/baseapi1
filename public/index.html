                
                      {<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cantinho da Vanessa </title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5}
header{background:#7b1113;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.mesa{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.15);cursor:pointer}
.livre{border-left:6px solid green}.ocupada{border-left:6px solid red}
button{background:#7b1113;color:#fff;border:none;padding:10px;border-radius:8px;cursor:pointer;margin:4px}
#painel,#admin{display:none;position:fixed;inset:0;background:#fff;padding:15px;overflow:auto}
input,select{width:100%;padding:8px;margin:5px 0}
table{width:100%;border-collapse:collapse} td,th{border-bottom:1px solid #ddd;padding:8px}
</style>
</head>
<body>
<header>
<h1>🍽️ Cantinho da Vanessa</h1>
<button onclick="abrirAdmin()">⚙️ Administração</button>
</header>

<div class="container">
<h2>Mesas</h2>
<div id="mesas" class="grid"></div>
</div>

<div id="painel">
<h2 id="tituloMesa"></h2>
<select id="produto"></select>
<input type="number" id="qtd" value="1" min="1">
<button onclick="addPedido()">Adicionar Pedido</button>
<button onclick="fecharConta()">Fechar Conta</button>
<button onclick="fecharPainel()">Voltar</button>
<table><tbody id="lista"></tbody></table>
<h3 id="totalMesa"></h3>
</div>

<div id="admin">
<h2>Administração</h2>
<input id="novoNome" placeholder="Produto">
<input id="novoPreco" type="number" placeholder="Preço">
<button onclick="addProduto()">Adicionar Produto</button>
<h3>Cardápio</h3>
<div id="listaCardapio"></div>
<br>
<button onclick="fecharAdmin()">Fechar</button>
</div>

<script>
let senha=localStorage.getItem("cv_senha")||"1265";

let cardapio=JSON.parse(localStorage.getItem("cv_card"))||[
{nome:"Espeto Carne",preco:10},
{nome:"Espeto Frango",preco:8},
{nome:"Refrigerante",preco:6},
{nome:"Água",preco:3}
];

let mesas=JSON.parse(localStorage.getItem("cv_mesas"))||Array.from({length:10},()=>[]);
let atual=0;

function salvar(){
localStorage.setItem("cv_card",JSON.stringify(cardapio));
localStorage.setItem("cv_mesas",JSON.stringify(mesas));
}

function renderMesas(){
mesas.innerHTML="";
document.getElementById("mesas").innerHTML=mesasData();
}
function mesasData(){
return mesas.map((m,i)=>{
let total=m.reduce((a,b)=>a+b.total,0);
let classe=m.length?"ocupada":"livre";
return `<div class="mesa ${classe}" onclick="abrirMesa(${i})">
<h3>Mesa ${i+1}</h3>
<p>${m.length} pedidos</p>
<b>R$ ${total.toFixed(2)}</b>
</div>`;
}).join("");
}

function carregarProdutos(){
produto.innerHTML="";
cardapio.forEach((p,i)=>produto.innerHTML+=`<option value="${i}">${p.nome} - R$ ${p.preco}</option>`);
}

function abrirMesa(i){atual=i;painel.style.display="block";tituloMesa.innerText="Mesa "+(i+1);atualizarMesa();}
function fecharPainel(){painel.style.display="none";}

function atualizarMesa(){
lista.innerHTML="";
let total=0;
mesas[atual].forEach(p=>{
total+=p.total;
lista.innerHTML+=`<tr><td>${p.nome}</td><td>${p.qtd}</td><td>R$ ${p.total.toFixed(2)}</td></tr>`;
});
totalMesa.innerText="Total: R$ "+total.toFixed(2);
salvar();
document.getElementById("mesas").innerHTML=mesasData();
}

function addPedido(){
let p=cardapio[produto.value];
let q=parseInt(qtd.value);
mesas[atual].push({nome:p.nome,qtd:q,total:p.preco*q});
atualizarMesa();
}

function fecharConta(){
mesas[atual]=[];
atualizarMesa();
alert("Conta encerrada!");
}

function abrirAdmin(){
let s=prompt("Digite a senha:");
if(s!==senha){alert("Senha incorreta!");return;}
admin.style.display="block";
mostrarCardapio();
}
function fecharAdmin(){admin.style.display="none";}

function addProduto(){
let nome=novoNome.value.trim();
let preco=parseFloat(novoPreco.value);
if(!nome||!preco)return;
cardapio.push({nome,preco});
salvar();
carregarProdutos();
mostrarCardapio();
novoNome.value="";novoPreco.value="";
}

function mostrarCardapio(){
listaCardapio.innerHTML=cardapio.map((p,i)=>`
<div>${p.nome} - R$ ${p.preco.toFixed(2)}
<button onclick="remover(${i})">Excluir</button></div>`).join("");
}

function remover(i){
cardapio.splice(i,1);
salvar();carregarProdutos();mostrarCardapio();
}

carregarProdutos();
document.getElementById("mesas").innerHTML=mesasData();
</script>
</body>
</html>
